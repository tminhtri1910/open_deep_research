name: PR Impact Analysis (GitNexus)
  
on:  
  pull_request:  
    types: [opened, synchronize, reopened]  

permissions:  
  contents: read  
  pull-requests: write  
  
jobs:  
  analyze-pr-impact:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4  
        with:  
          fetch-depth: 0  # Need full history for diff  
  
      - name: Setup Node.js  
        uses: actions/setup-node@v4  
        with:  
          node-version: '20'  
  
      - name: Install GitNexus  
        run: npm install -g gitnexus  
  
      - name: Index repository  
        run: gitnexus analyze  
  
      - name: Detect changes from PR diff  
        run: gitnexus detect-changes --scope compare --base-ref origin/${{ github.base_ref }} > changed-symbols.txt  
  
      - name: Parse and analyze impact  
        run: |  
          node -e '  
            const fs = require("fs");  
            const { execSync } = require("child_process");  
            const output = fs.readFileSync("changed-symbols.txt", "utf8");  
            console.log(output);  
              
            // Extract symbol names from output and run impact  
            const lines = output.split("\n");  
            const impactResults = []; 

            lines.forEach(line => {  
              const match = line.match(/(\w+)\s+(\w+)\s+â†’/);  
              if (match) {  
                const symbolName = match[2];  
                try {  
                  const result = execSync(  
                    `gitnexus impact "${symbolName}" --direction upstream --depth 3`,  
                    { encoding: "utf8" }  
                  );  
                  impactResults.push({ symbol: symbolName, result });  
                  console.log(result);  
                } catch (e) {  
                  impactResults.push({ symbol: symbolName, error: e.message }); 
                  console.log("Error analyzing", symbolName, e.message);  
                }  
              }  
            });  

            // Save results for comment step  
            fs.writeFileSync("impact-results.json", JSON.stringify(impactResults));
          '
  
      - name: Comment PR with impact report  
        uses: actions/github-script@v7  
        with:  
          script: |  
            const fs = require("fs");  
            const impactResults = JSON.parse(fs.readFileSync("impact-results.json", "utf8"));  
              
            let body = "## đź”Ť PR Impact Analysis\n\n";  
              
            if (impactResults.length === 0) {  
              body += "No changed symbols detected.\n";  
            } else {  
              body += `Analyzed **${impactResults.length}** changed symbols:\n\n`;  
                
              impactResults.forEach(({ symbol, result, error }) => {  
                body += `### ${symbol}\n`;  
                if (error) {  
                  body += `âťŚ Error: ${error}\n\n`;  
                } else {  
                  body += "```\n" + result + "\n```\n\n";  
                }  
              });  
            }  
              
            await github.rest.issues.createComment({  
              issue_number: context.issue.number,  
              owner: context.repo.owner,  
              repo: context.repo.repo,  
              body: body  
            });