# Name of the GitHub Action workflow
name: PR Impact Analysis  
  
# Trigger the workflow on pull requests targeting the 'main' branch
on:  
  pull_request:
    types: [opened, reopened, ready_for_review]
  
jobs:  
  impact-analysis:  
    # Run the job on the latest Ubuntu runner
    runs-on: ubuntu-latest  
    steps:  
      # Step 1: Checkout the repository code
      - uses: actions/checkout@v4  
        with:  
          # Fetch all history for all tags and branches (needed for accurate diffing)
          fetch-depth: 0  

  
      # Step 2: Download and install the 'sem' CLI tool from Ataraxy-Labs
      - name: Install sem  
        run: |  
          curl -L https://github.com/Ataraxy-Labs/sem/releases/latest/download/sem-linux-x86_64.tar.gz -o sem.tar.gz  
          tar -xzf sem.tar.gz  
          chmod +x sem  
          # Move the executable to a directory in the system's PATH
          sudo mv sem /usr/local/bin/  

      # Step 3: Run 'sem diff' to compute a semantic diff between the target branch and the PR
      - name: Get semantic diff
        id: diff
        run: |
          # Compare origin/main with the current HEAD and output results to diff.json
          sem diff --from origin/${{ github.base_ref }} --to HEAD --format json > diff.json  
          # Expose the JSON output as a step output variable for potential downstream use
          echo "diff_output<<EOF" >> $GITHUB_OUTPUT
          cat diff.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Step 4: Extract dependents
      - name: Extract dependents with code content (Markdown)  
        id: dependents  
        run: |  
          echo "# Dependents with Code Content" > dependents_report.md  
            
          # Extract all changed entities  
          jq -c '.changes[]' diff.json | while read -r change; do  
            entity_name=$(echo "$change" | jq -r '.entityName')  
            file_path=$(echo "$change" | jq -r '.filePath')  
              
            echo "## $entity_name ($file_path)" >> dependents_report.md  
              
            # Get context with --file flag  
            if sem context "$entity_name" --file "$file_path" --json > context.json 2>/dev/null; then  
              # Extract dependents and format separately  
              jq -r '.entries[] |   
                select(.role == "direct_dependent" or .role == "transitive_dependent") |   
                @json' context.json | while read -r dep; do  
                name=$(echo "$dep" | jq -r '.name')  
                type=$(echo "$dep" | jq -r '.type')  
                file=$(echo "$dep" | jq -r '.file')  
                role=$(echo "$dep" | jq -r '.role')  
                content=$(echo "$dep" | jq -r '.content')  
                  
                echo "### $name ($type)" >> dependents_report.md  
                echo "File: $file" >> dependents_report.md  
                echo "Role: $role" >> dependents_report.md  
                echo '```' >> dependents_report.md  
                echo "$content" >> dependents_report.md  
                echo '```' >> dependents_report.md  
              done  
            fi 
              
            echo "" >> dependents_report.md  
          done

          # Expose the Markdown report content as a step output variable
          echo "dependents_report<<EOF" >> $GITHUB_OUTPUT
          cat dependents_report.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Extract dependents with code content (JSON)
        id: dependents_json
        run: |  
          echo '{"dependents": [' > dependents.json  
            
          jq -c '.changes[]' diff.json | while read -r change; do  
            entity_name=$(echo "$change" | jq -r '.entityName')  
            file_path=$(echo "$change" | jq -r '.filePath')  
              
            if sem context "$entity_name" --file "$file_path" --json > context.json 2>/dev/null; then  
              # Extract dependents as JSON  
              jq -c '.entries[] | select(.role == "direct_dependent" or .role == "transitive_dependent")' context.json | while read -r dep; do  
                  
                # Add changed_entity field  
                echo "$dep" | jq -c --arg changed "$entity_name" '. + {changed_entity: $changed}'  
                  
              done  
            fi  
          done | paste -sd ',' - >> dependents.json  
            
          echo ']}' >> dependents.json

          # Expose the JSON output as a step output variable
          echo "dependents_report<<EOF" >> $GITHUB_OUTPUT
          cat dependents.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Step 5: Post the generated impact report as a comment on the pull request
      - name: Comment PR with impact report  
        uses: actions/github-script@v7  
        env:
          # IMPACT_REPORT: ${{ steps.impact.outputs.impact_report }}
          IMPACT_REPORT: ${{ steps.dependents_json.outputs.dependents_report }}
        with:  
          script: |  
            // Use the GitHub REST API to create a comment on the current PR
            github.rest.issues.createComment({  
              issue_number: context.issue.number,  
              owner: context.repo.owner,  
              repo: context.repo.repo,  
              body: process.env.IMPACT_REPORT
            })

