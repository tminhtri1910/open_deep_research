name: PR Review (Code-review-graph)
  
on:  
  pull_request:  
    branches: [main]  
    types: [opened, synchronize, reopened]  
  
permissions:  
  contents: read  
  # pull-requests: write  
  
jobs:  
  review:  
    runs-on: ubuntu-latest  
    steps:  
